      + mExpenses.items.map(i=>{
          const tag = i.recurring ? '🔄' : '✎';
          const safe = JSON.stringify({_id:i._id,name:i.name,amount:i.amount,month:cashMonth,category:i.category,notes:i.notes}).replace(/'/g,'&#39;');
          return `<div class="cfrow" style="cursor:pointer" onclick='openModal("editExpense",${safe})'><span>${i.name} <span style="font-size:10px;color:var(--tx3)">· ${tag}</span></span><span class="cfval neg">-USD ${i.amount.toFixed(2)}</span></div>`;
        }).join('')
      + `<div class="cfrow" style="border-top:2px solid var(--gold)"><span style="font-weight:600">Total gastos</span><span class="cfval neg">-USD ${mExpenses.total.toFixed(2)}</span></div></div>`;
  }

  else if(cashView==='resumen'){
    const currentYrR = new Date().getFullYear();
    const yearOptsR = [currentYrR-1, currentYrR, currentYrR+1, currentYrR+2].map(y=>`<option value="${y}"${y===cashYear&&!cashRolling?' selected':''}>${y}</option>`).join('');
    const yearControlR = `<div style="display:flex;gap:12px;align-items:center;margin:8px 0;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:6px"><label style="font-size:12px;color:var(--tx2)">Año:</label><select ${cashRolling?'disabled':''} onchange="cashYear=parseInt(this.value);cashRolling=false;renderCash()" style="padding:4px 8px;background:var(--s2);border:1px solid var(--bdr);border-radius:4px;color:var(--tx);font-size:12px">${yearOptsR}</select></div>
      <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--tx2);cursor:pointer"><input type="checkbox" ${cashRolling?'checked':''} onchange="cashRolling=this.checked;renderCash()"> 📅 Próximos 12 meses</label>
    </div>`;
    const periodLabel = cashRolling ? 'próximos 12m' : year;
    const monthlyData = ymArr.map((ym,i)=>{
      const inc = items.filter(it => it.month===ym).reduce((a,it)=>a+(it.amount||0),0);
      const exp = getMonthExpenses(parseInt(ym.split('-')[1])-1).total;
      return {month:months[i], ingreso:inc, gasto:exp, neto:inc-exp};
    });
    const totalIngresos = monthlyData.reduce((a,m)=>a+m.ingreso,0);
    const totalGastos = monthlyData.reduce((a,m)=>a+m.gasto,0);
    const totalNet = totalIngresos - totalGastos;

    let acum = 0;
    const acumPoints = monthlyData.map(m=>{ acum += m.neto; return {label:m.month, value:acum}; });

    content = yearControlR + `<div class="kgrid">`
      + `<div class="kcard"><div class="kl">Ingresos ${periodLabel} (USD)</div><div class="kv" style="color:var(--gn)">${totalIngresos.toFixed(0)}</div></div>`
      + `<div class="kcard"><div class="kl">Gastos ${periodLabel} (USD)</div><div class="kv" style="color:var(--rd)">${totalGastos.toFixed(0)}</div></div>`
      + `</div>`
      + `<div class="kcard w" style="margin-bottom:16px"><div class="kl">Ganancia neta ${periodLabel} (USD)</div><div class="kv" style="color:${totalNet>=0?'var(--gn)':'var(--rd)'}">${totalNet.toFixed(0)}</div></div>`
      + `<div class="lcard" style="cursor:default;margin-top:8px"><div class="lcard-name" style="margin-bottom:8px">📈 Surplus acumulado</div>${svgLineChart(acumPoints,200)}</div>`
      + `<div class="lcard" style="cursor:default;margin-top:8px"><div class="lcard-name" style="margin-bottom:6px">Mes a mes</div>`
      + monthlyData.map(m=>`<div class="cfrow"><span><b>${m.month}</b></span><span style="font-size:11px;display:flex;gap:12px"><span style="color:var(--gn)">+${m.ingreso.toFixed(0)}</span><span style="color:var(--rd)">-${m.gasto.toFixed(0)}</span><span style="color:${m.neto>=0?'var(--gn)':'var(--rd)'};font-weight:600">${m.neto>=0?'+':''}${m.neto.toFixed(0)}</span></span></div>`).join('')
      + `<div class="cfrow" style="border-top:2px solid var(--gold)"><span style="font-weight:600">Total (USD)</span><span style="font-size:11px;display:flex;gap:12px"><span style="color:var(--gn)">+${totalIngresos.toFixed(0)}</span><span style="color:var(--rd)">-${totalGastos.toFixed(0)}</span><span style="font-weight:600;color:${totalNet>=0?'var(--gn)':'var(--rd)'}">${totalNet.toFixed(0)}</span></span></div></div>`;
  }

  else if(cashView==='donde'){
    const allPending = items.filter(it=>it.status==='pendiente').reduce((a,it)=>a+(it.amount||0),0);
    const allCobrado = items.filter(it=>it.status==='cobrada').reduce((a,it)=>a+(it.amount||0),0);
    const allProyectado = items.filter(it=>it.status==='proyectado').reduce((a,it)=>a+(it.amount||0),0);

    // Items pendientes + proyectados para mostrar en breakdown mensual
    const futureItems = items.filter(it => it.status==='pendiente' || it.status==='proyectado');

    // Agrupar por mes
    const byMonth = {};
    const noMonth = [];
    futureItems.forEach(it=>{
      if(it.month){
        if(!byMonth[it.month]) byMonth[it.month] = [];
        byMonth[it.month].push(it);
      } else {
        noMonth.push(it);
      }
    });
    const sortedMonths = Object.keys(byMonth).sort();

    // Render del breakdown mensual
    let breakdownHTML = '';
    if(sortedMonths.length){
      sortedMonths.forEach(ym => {
        const list = byMonth[ym];
        const total = list.reduce((a,it)=>a+(it.amount||0),0);
        const pendingPart = list.filter(it=>it.status==='pendiente').reduce((a,it)=>a+(it.amount||0),0);
        const projectedPart = list.filter(it=>it.status==='proyectado').reduce((a,it)=>a+(it.amount||0),0);
        breakdownHTML += `<div class="lcard" style="cursor:default;margin-top:8px">
          <div class="lcard-name" style="margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">
            <span>📅 ${ymToLabel(ym)}</span>
            <span style="color:var(--gold);font-size:14px">USD ${total.toLocaleString()}</span>
          </div>
          <div style="font-size:10px;color:var(--tx3);margin-bottom:6px">${list.length} item(s)${pendingPart>0?' · ⏳ pendiente '+pendingPart.toLocaleString():''}${projectedPart>0?' · 🔮 proyectado '+projectedPart.toLocaleString():''}</div>
          ${list.map(it=>{
            const col = it.status==='proyectado' ? 'var(--pp)' : 'var(--yw)';
            const ic = it.status==='proyectado' ? '🔮' : '⏳';
            const onclickAttr = it.projectedId ? `onclick="openProjectedModal('${it.projectedId}')"` : (it.incomeItemId ? `onclick="openIncomeItemModal('${it.incomeItemId}')"` : (it.clientId ? `onclick="showClientDetail('${it.clientId}')"` : ''));
            return `<div class="cfrow" style="cursor:${onclickAttr?'pointer':'default'};padding-left:12px" ${onclickAttr}>
              <span style="font-size:12px">${ic} ${it.name}</span>
              <span class="cfval" style="color:${col};font-size:12px">USD ${(it.amount||0).toLocaleString()}</span>
            </div>`;
          }).join('')}
        </div>`;
      });
    }

    // Sección "Sin mes asignado"
    let noMonthHTML = '';
    if(noMonth.length){
      const noMonthTotal = noMonth.reduce((a,it)=>a+(it.amount||0),0);
      noMonthHTML = `<div class="lcard" style="cursor:default;margin-top:8px;border:1px dashed var(--rd)">
        <div class="lcard-name" style="margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">
          <span>⚠️ Sin mes asignado</span>
          <span style="color:var(--rd);font-size:14px">USD ${noMonthTotal.toLocaleString()}</span>
        </div>
        <div style="font-size:10px;color:var(--tx3);margin-bottom:6px">Asigná un mes esperado editando cada item para verlo proyectado</div>
        ${noMonth.map(it=>{
          const col = it.status==='proyectado' ? 'var(--pp)' : 'var(--yw)';
          const ic = it.status==='proyectado' ? '🔮' : '⏳';
          const onclickAttr = it.projectedId ? `onclick="openProjectedModal('${it.projectedId}')"` : (it.incomeItemId ? `onclick="openIncomeItemModal('${it.incomeItemId}')"` : (it.clientId ? `onclick="showClientDetail('${it.clientId}')"` : ''));
          return `<div class="cfrow" style="cursor:${onclickAttr?'pointer':'default'};padding-left:12px" ${onclickAttr}>
            <span style="font-size:12px">${ic} ${it.name}</span>
            <span class="cfval" style="color:${col};font-size:12px">USD ${(it.amount||0).toLocaleString()}</span>
          </div>`;
        }).join('')}
      </div>`;
    }

    content = `<div class="kgrid" style="margin-top:8px">
      <div class="kcard"><div class="kl">💰 Cobrado ${year}</div><div class="kv" style="color:var(--gn)">USD ${allCobrado.toFixed(0)}</div></div>
      <div class="kcard"><div class="kl">⏳ Pendiente por cobrar</div><div class="kv" style="color:var(--yw)">USD ${allPending.toFixed(0)}</div></div>
      <div class="kcard"><div class="kl">🔮 Proyectado (probables)</div><div class="kv" style="color:var(--pp)">USD ${allProyectado.toFixed(0)}</div></div>
      <div class="kcard"><div class="kl">💼 Total futuro</div><div class="kv" style="color:var(--gold)">USD ${(allPending+allProyectado).toFixed(0)}</div></div>
    </div>
    <div style="margin:16px 0 4px;padding:0 4px;display:flex;justify-content:space-between;align-items:center"><div><b>📅 Detalle mensual de lo que vas a cobrar</b><br><span style="font-size:11px;color:var(--tx3)">⏳ amarillo = pendiente (confirmado) · 🔮 violeta = proyectado (probable). Click para editar.</span></div><button class="btn-add" onclick="dedupeFeesManual()">🧹 Limpiar duplicados</button></div>
    ${breakdownHTML}
    ${noMonthHTML}
    ${!breakdownHTML && !noMonthHTML ? '<div class="empty" style="padding:32px;margin-top:16px"><div class="em">✅</div><p>No tenés nada por cobrar</p></div>' : ''}
    `;
  }

  // Sección Movimientos solo en vista Mensual (es la única donde tiene sentido el detalle de transacciones recientes)
  const showMovimientos = (cashView === 'mensual');
  const movimientosHTML = showMovimientos
    ? `<div class="shdr"><h3>Últimos 10 movimientos</h3><div style="display:flex;gap:6px"><button class="btn-add" onclick="exportCommissions()">📊 Exportar</button><button class="btn-add" onclick="openModal('addPayment')">+ Pago</button></div></div>`
      + (payments.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)).slice(0,10).map(p=>{
          const cn=clients[p.clientId]?.name||'—';
          const isCobrado = p.status==='Cobrado';
          const col = isCobrado ? 'var(--gn)' : 'var(--yw)';
          const ic = isCobrado ? '💰' : '⏳';
          return `<div class="cfrow"><span>${ic} ${cn}<br><span style="font-size:10px;color:var(--tx3)">${p.concept} · ${p.method} · ${p.date||'sin fecha'}</span></span><span class="cfval" style="color:${col}">USD ${p.amount.toLocaleString()}</span></div>`;
        }).join('') || `<div style="font-size:12px;color:var(--tx3);padding:8px">Sin movimientos</div>`)
    : '';

  document.getElementById('cashArea').innerHTML = viewTabs + content + movimientosHTML;
}


// ═══════════════════════════════════════════════════════════════
// RENDER: ESTADÍSTICAS (histórico de leads perdidos + clientes)
// ═══════════════════════════════════════════════════════════════
function renderStats(){
  const allLeads = Object.values(D.leads);
  const allClients = Object.values(D.clients);

  // Totales
  const totalLeads = allLeads.length;
  const lost = allLeads.filter(l => l.stage === 'Perdido');
  const closed = allLeads.filter(l => l.stage === 'Cerrado');
  const inProgress = allLeads.filter(l => l.stage !== 'Perdido' && l.stage !== 'Cerrado');

  // Clientes reales (cuenta como "cerrados" reales porque ya están convertidos)
  const clientsActive = allClients.filter(c => (c.status||'activo')==='activo').length;
  const clientsTraveling = allClients.filter(c => c.status==='viajando').length;
  const clientsFinished = allClients.filter(c => c.status==='finalizado').length;
  const clientsLost = allClients.filter(c => c.status==='perdido').length;

  // Denominador total (incluye leads y clientes — cada cliente fue un lead cerrado)
  const universeTotal = totalLeads + allClients.length;
  const totalClosed = closed.length + allClients.length; // cerrados = leads cerrados + clientes
  const totalLost = lost.length + clientsLost;
  const closeRate = universeTotal ? Math.round((totalClosed / universeTotal) * 100) : 0;
  const lossRate = universeTotal ? Math.round((totalLost / universeTotal) * 100) : 0;

  // Por canal
  const canalStats = {};
  allLeads.forEach(l => {
    const c = l.canal || 'Sin canal';
    if(!canalStats[c]) canalStats[c] = {total:0, cerrado:0, perdido:0, abierto:0};
    canalStats[c].total++;
    if(l.stage === 'Cerrado') canalStats[c].cerrado++;
    else if(l.stage === 'Perdido') canalStats[c].perdido++;
    else canalStats[c].abierto++;
  });
  allClients.forEach(c => {
    const canal = c.canal || 'Sin canal';
    if(!canalStats[canal]) canalStats[canal] = {total:0, cerrado:0, perdido:0, abierto:0};
    canalStats[canal].total++;
    if(c.status === 'perdido') canalStats[canal].perdido++;
    else canalStats[canal].cerrado++;
  });

  const canalHTML = Object.entries(canalStats).map(([c,s])=>{
    const cr = s.total ? Math.round((s.cerrado/s.total)*100) : 0;
    const lr = s.total ? Math.round((s.perdido/s.total)*100) : 0;
    return `<div class="cfrow" style="cursor:default"><span><b>${c}</b><br><span style="font-size:10px;color:var(--tx3)">${s.total} totales · ${s.abierto} abiertos</span></span><span style="font-size:11px;display:flex;gap:10px"><span style="color:var(--gn)">✅ ${s.cerrado} (${cr}%)</span><span style="color:var(--rd)">❌ ${s.perdido} (${lr}%)</span></span></div>`;
  }).join('');

  // Lista de perdidos (leads)
  const lostLeadsHTML = lost.length ? lost.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0)).map(l=>{
    const leadId = Object.entries(D.leads).find(([id,ll])=>ll===l)?.[0];
    return `<div class="cfrow" style="cursor:pointer" onclick="showLeadDetail('${leadId}')"><span>${l.name||'—'}<br><span style="font-size:10px;color:var(--tx3)">${l.dest||'—'} · ${l.canal||''} · ${ago(l.createdAt)}</span>${l.notes?'<br><span style="font-size:10px;color:var(--tx3);font-style:italic">"'+l.notes.slice(0,80)+(l.notes.length>80?'...':'')+'"</span>':''}</span><span class="cfval" style="color:var(--rd);font-size:11px">${l.canal||''}</span></div>`;
  }).join('') : '<div style="font-size:12px;color:var(--tx3);padding:12px">Sin leads perdidos</div>';

  // Lista clientes perdidos
  const lostClientsHTML = clientsLost ? allClients.filter(c=>c.status==='perdido').map(c=>{
    const cid = Object.entries(D.clients).find(([id,cc])=>cc===c)?.[0];
    return `<div class="cfrow" style="cursor:pointer" onclick="showClientDetail('${cid}')"><span>${c.name||'—'}<br><span style="font-size:10px;color:var(--tx3)">${c.dest||'—'} · ${c.canal||''}</span></span><span class="cfval" style="color:var(--rd);font-size:11px">Cliente perdido</span></div>`;
  }).join('') : '<div style="font-size:12px;color:var(--tx3);padding:12px">Sin clientes perdidos</div>';

  // Lista clientes (cerrados = activos + viajando + finalizados)
  const activeClientsHTML = (clientsActive+clientsTraveling+clientsFinished) ? allClients.filter(c=>c.status!=='perdido').sort((a,b)=>((a.status||'activo')==='finalizado'?1:0)-((b.status||'activo')==='finalizado'?1:0)).map(c=>{
    const cid = Object.entries(D.clients).find(([id,cc])=>cc===c)?.[0];
    const statusIcon = c.status==='viajando'?'✈️':c.status==='finalizado'?'✅':'🟢';
    return `<div class="cfrow" style="cursor:pointer" onclick="showClientDetail('${cid}')"><span>${statusIcon} ${c.name||'—'}<br><span style="font-size:10px;color:var(--tx3)">${c.dest||'—'} · ${c.canal||''}</span></span><span class="cfval" style="color:var(--gn);font-size:11px">USD ${(c.fee||0).toLocaleString()}</span></div>`;
  }).join('') : '<div style="font-size:12px;color:var(--tx3);padding:12px">Sin clientes</div>';

  // Gráfico: funnel simplificado
  const stageData = LEAD_STAGES.map(s => {
    const cnt = allLeads.filter(l => l.stage === s).length + (s === 'Cerrado' ? allClients.filter(c=>c.status!=='perdido').length : 0) + (s === 'Perdido' ? clientsLost : 0);
    return {stage: s, count: cnt};
  });
  const maxCnt = Math.max(1, ...stageData.map(s=>s.count));
  const funnelHTML = stageData.map(s=>{
    const pct = Math.round((s.count/maxCnt)*100);
    const color = STAGE_COLORS[s.stage] || 'var(--tx3)';
    return `<div class="fbar"><div class="fbar-top"><span>${s.stage}</span><span>${s.count}</span></div><div class="fbar-track"><div class="fbar-fill" style="width:${Math.max(pct,s.count?8:0)}%;background:${color}">${s.count}</div></div></div>`;
  }).join('');

  document.getElementById('v-stats').innerHTML = `
    <button class="back" onclick="go('pipeline')">← Pipeline</button>
    <h2 style="padding:8px 4px;margin:0">📈 Estadísticas</h2>

    <div class="kgrid">
      <div class="kcard"><div class="kl">Total leads</div><div class="kv">${totalLeads}</div></div>
      <div class="kcard"><div class="kl">Clientes</div><div class="kv" style="color:var(--gn)">${allClients.length}</div></div>
      <div class="kcard"><div class="kl">Tasa de cierre</div><div class="kv" style="color:${closeRate>=15?'var(--gn)':'var(--yw)'}">${closeRate}%</div><div class="ks">${totalClosed}/${universeTotal}</div></div>
      <div class="kcard"><div class="kl">Tasa de pérdida</div><div class="kv" style="color:${lossRate<=50?'var(--gn)':'var(--rd)'}">${lossRate}%</div><div class="ks">${totalLost}/${universeTotal}</div></div>
    </div>

    <div class="lcard" style="cursor:default;margin-top:8px"><div class="lcard-name" style="margin-bottom:6px">Clientes por estado</div>
      <div class="cfrow"><span>🟢 Activos (armando)</span><span class="cfval" style="color:var(--gn)">${clientsActive}</span></div>
      <div class="cfrow"><span>✈️ Viajando</span><span class="cfval" style="color:var(--gold)">${clientsTraveling}</span></div>
      <div class="cfrow"><span>✅ Finalizados</span><span class="cfval" style="color:var(--gn)">${clientsFinished}</span></div>
      <div class="cfrow"><span>❌ Perdidos</span><span class="cfval" style="color:var(--rd)">${clientsLost}</span></div>
    </div>

    <div class="lcard" style="cursor:default;margin-top:8px"><div class="lcard-name" style="margin-bottom:6px">Funnel completo (leads + clientes)</div>
      ${funnelHTML}
    </div>

    <div class="lcard" style="cursor:default;margin-top:8px"><div class="lcard-name" style="margin-bottom:6px">Conversión por canal</div>
      ${canalHTML || '<div style="font-size:12px;color:var(--tx3);padding:8px">Sin datos</div>'}
    </div>

    <div class="shdr"><h3>❌ Leads perdidos (${lost.length})</h3></div>
    ${lostLeadsHTML}

    ${clientsLost ? `<div class="shdr"><h3>❌ Clientes perdidos (${clientsLost})</h3></div>${lostClientsHTML}` : ''}

    <div class="shdr"><h3>✅ Clientes (${allClients.filter(c=>c.status!=='perdido').length})</h3></div>
    ${activeClientsHTML}
  `;
}





// ═══════════════════════════════════════════════════════════════
// RENDER: SQUARE (invoices + payments + payouts)
// ═══════════════════════════════════════════════════════════════
let squareFilter = 'active'; // active | all | paid | pending | payouts

function renderSquare(){
  const invoices = Object.entries(D.squareInvoices||{}).map(([id,i])=>({...i,_id:id}));
  const payouts = Object.entries(D.squarePayouts||{}).map(([id,p])=>({...p,_id:id}));

  invoices.sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
  payouts.sort((a,b)=>(b.sentAt||0)-(a.sentAt||0));

  // KPIs
  const pending = invoices.filter(i=>i.status==='published' || i.status==='draft').reduce((a,i)=>a+(i.totalAmount||0),0);
  const paid30 = invoices.filter(i=>i.status==='paid' && i.paidAt && (Date.now()-i.paidAt)<30*86400000).reduce((a,i)=>a+(i.totalAmount||0),0);
  const last30Payout = payouts.filter(p=>p.sentAt && (Date.now()-p.sentAt)<30*86400000).reduce((a,p)=>a+(p.amount||0),0);
  const unlinkedCount = invoices.filter(i=>!i.clientId).length;

  // Filtros
  let filtered = invoices;
  if(squareFilter === 'active') filtered = invoices.filter(i=>i.status!=='canceled');
  else if(squareFilter === 'paid') filtered = invoices.filter(i=>i.status==='paid');
  else if(squareFilter === 'pending') filtered = invoices.filter(i=>i.status==='published' || i.status==='draft');
  else if(squareFilter === 'payouts') filtered = [];

  const tabs = [
    {id:'active',label:'Activas',count:invoices.filter(i=>i.status!=='canceled').length},
    {id:'pending',label:'⏳ Por cobrar',count:invoices.filter(i=>i.status==='published' || i.status==='draft').length},
    {id:'paid',label:'💰 Pagadas',count:invoices.filter(i=>i.status==='paid').length},
    {id:'payouts',label:'🏦 Payouts',count:payouts.length},
    {id:'all',label:'Todas',count:invoices.length}
  ];
  const tabsHTML = tabs.map(t=>`<button class="ftab${squareFilter===t.id?' on':''}" onclick="squareFilter='${t.id}';renderSquare()">${t.label} (${t.count})</button>`).join('');

  const statusIcon = {'draft':'📝','published':'⏳','paid':'💰','canceled':'❌','partial':'🟡'};
  const statusLabel = {'draft':'Borrador','published':'Enviada (por cobrar)','paid':'Pagada','canceled':'Cancelada','partial':'Pago parcial'};
  const statusColor = {'draft':'var(--tx3)','published':'var(--yw)','paid':'var(--gn)','canceled':'var(--rd)','partial':'var(--or)'};

  let listHTML = '';
  if(squareFilter === 'payouts'){
    listHTML = payouts.length ? payouts.map(p=>{
      const when = p.sentAt ? new Date(p.sentAt).toLocaleDateString('es-AR') : '—';
      return `<div class="cfrow" style="cursor:default">
        <span>🏦 Payout ${when}<br><span style="font-size:10px;color:var(--tx3)">${p.destination||'cuenta bancaria'} · ${p.currency||'AUD'}</span></span>

function linkSquareInvoice(id){
  const inv = D.squareInvoices[id];
  if(!inv) return;
  const clientId = document.getElementById('sqi-client').value;
  inv.clientId = clientId || null;
  // Si la invoice ya está pagada y se vincula, crear movement automáticamente
  if(clientId && inv.status==='paid' && !inv.autoPaymentId){
    const payId = 'pay_' + uid();
    D.payments[payId] = {
      clientId,
      concept: inv.title || 'Fee (Square)',
      amount: inv.totalAmount || 0,
      method: 'Square (AUD)',
      status: 'Cobrado',
      date: new Date(inv.paidAt || Date.now()).toISOString().slice(0,10),
      createdAt: Date.now(),
      autoFromSquareInvoice: id
    };
    inv.autoPaymentId = payId;
    showNotif('💰 Movimiento auto-creado');
  }
  save(); closeModal(); showNotif('Invoice vinculada ✓');
  renderCurrent();
}

function deleteSquareInvoice(id){
  if(!confirm('¿Borrar esta invoice del dashboard? (No afecta Square)')) return;
  const inv = D.squareInvoices[id];
  if(inv && inv.autoPaymentId && D.payments[inv.autoPaymentId]){
    delete D.payments[inv.autoPaymentId];
  }
  delete D.squareInvoices[id];
  save(); closeModal(); showNotif('Eliminada');
  renderCurrent();
}

// RENDER: INBOX (mails capturados desde Outlook via Power Automate)
// ═══════════════════════════════════════════════════════════════
let inboxFilter = 'unread'; // unread | all | comision | reserva | archer | cliente | archived

function renderInbox(){
  const all = Object.entries(D.inbox||{}).map(([id,m])=>({...m,_id:id}));
  // Detectar categoría del mail si no viene seteada
  all.forEach(m=>{
    if(!m.category){
      const s = ((m.from||'') + ' ' + (m.subject||'')).toLowerCase();
      if(/expedia|civitatis|viator|ratehawk|stuba|archer|comision|commission|payout/.test(s)) m.category = 'comision';
      else if(/booking|reserv|confirm/.test(s)) m.category = 'reserva';
      else if(/archer/.test(s)) m.category = 'archer';
      else m.category = 'otro';
    }
  });

  let filtered = all;
  if(inboxFilter === 'unread') filtered = all.filter(m=>!m.read && !m.archived);
  else if(inboxFilter === 'archived') filtered = all.filter(m=>m.archived);
  else if(inboxFilter !== 'all') filtered = all.filter(m=>m.category===inboxFilter && !m.archived);
  filtered.sort((a,b)=>(b.receivedAt||0)-(a.receivedAt||0));

  const unreadCount = all.filter(m=>!m.read && !m.archived).length;

  const counts = {
    unread: all.filter(m=>!m.read && !m.archived).length,
    comision: all.filter(m=>m.category==='comision' && !m.archived).length,
    reserva: all.filter(m=>m.category==='reserva' && !m.archived).length,
    archer: all.filter(m=>m.category==='archer' && !m.archived).length,
    cliente: all.filter(m=>m.category==='cliente' && !m.archived).length,
    otro: all.filter(m=>m.category==='otro' && !m.archived).length,
    archived: all.filter(m=>m.archived).length,
    all: all.length
  };

  const tabs = [
    {id:'unread',label:'🔴 No leídos',count:counts.unread},
    {id:'comision',label:'💰 Comisiones',count:counts.comision},
    {id:'reserva',label:'🏨 Reservas',count:counts.reserva},
    {id:'archer',label:'🏢 Archer',count:counts.archer},
    {id:'cliente',label:'👤 Clientes',count:counts.cliente},
    {id:'otro',label:'📦 Otros',count:counts.otro},
    {id:'archived',label:'🗄️ Archivados',count:counts.archived},
    {id:'all',label:'Todos',count:counts.all}
  ];
  const tabsHTML = tabs.map(t=>`<button class="ftab${inboxFilter===t.id?' on':''}" onclick="inboxFilter='${t.id}';renderInbox()">${t.label} (${t.count})</button>`).join('');

  const catIcon = {comision:'💰',reserva:'🏨',archer:'🏢',cliente:'👤',otro:'📦'};

  const listHTML = filtered.length ? filtered.map(m=>{
    const when = m.receivedAt ? ago(m.receivedAt) : '—';
    const ic = catIcon[m.category] || '📨';
    const dotColor = m.read ? 'transparent' : 'var(--gold)';
    const preview = (m.bodyText||m.bodyPreview||'').slice(0,140).replace(/\s+/g,' ');
    return `<div class="cfrow" style="cursor:pointer;align-items:flex-start" onclick="openInboxModal('${m._id}')">
      <span>
        <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${dotColor};margin-right:6px"></span>
        ${ic} <b>${m.subject||'(sin asunto)'}</b>
        <br><span style="font-size:10px;color:var(--tx3)">${m.from||''} · ${when}</span>
        ${preview?'<br><span style="font-size:10px;color:var(--tx2);font-style:italic">'+preview+'...</span>':''}
      </span>
      <span style="font-size:11px;color:var(--tx3);white-space:nowrap">→</span>
    </div>`;
  }).join('') : '<div class="empty" style="padding:24px"><div class="em">📭</div><p>Nada nuevo acá</p></div>';

  // Setup info si está vacío
  let setupHint = '';
  if(!all.length){
    setupHint = `<div class="lcard" style="cursor:default;background:var(--s2);border:1px dashed var(--gold)">
      <div class="lcard-name" style="margin-bottom:6px;color:var(--gold)">⚙️ Setup Inbox</div>
      <div style="font-size:12px;color:var(--tx2);line-height:1.5">
        Esta vista recibe mails desde Outlook vía Power Automate.<br><br>
        <b>Configuración pendiente:</b><br>
        1. Deployar Apps Script web-app (endpoint)<br>
        2. Crear flows en Power Automate que envíen mails al endpoint<br>
        3. Cuando llegue un mail relevante aparecerá acá automáticamente
      </div>
    </div>`;
  }

  document.getElementById('v-inbox').innerHTML = `
    <div style="padding:4px 0 8px">
      <h2 style="margin:0;font-size:20px">📬 Inbox</h2>
      <div style="font-size:12px;color:var(--tx3)">${unreadCount} no leído(s) · ${counts.all} total</div>
    </div>
    <div class="ftabs" style="margin-bottom:8px">${tabsHTML}</div>
    ${setupHint}
    ${listHTML}
  `;

  // Update badge
  const badge = document.getElementById('inboxBadge');
  if(badge){
    badge.textContent = unreadCount > 0 ? '●' : '';
  }
}

function inboxActionCreateTask(id){
  const m = D.inbox[id];
  if(!m) return;
  const title = prompt('Título de la tarea:', '📧 ' + (m.subject||'Mail'));
  if(!title) return;
  const tid = 'task_' + uid();
  D.tasks[tid] = {
    title, cat:'operaciones', pri:'yw',
    notes: 'Desde mail: ' + (m.from||'') + '\n\n' + (m.bodyPreview||'').slice(0,500),
    done:false, createdAt:Date.now()
  };
  m.processedAs = 'task:' + tid;
  save(); closeModal(); showNotif('Tarea creada ✓');
  renderCurrent();
}

function inboxActionRegisterCommission(id){
  const m = D.inbox[id];
  if(!m) return;
  // Intentar extraer monto del mail
  const text = (m.subject||'') + ' ' + (m.bodyText||m.bodyPreview||'');
  const amountMatch = text.match(/(?:USD?|\$)\s*(\d+(?:[.,]\d+)?)/i);
  const suggestedAmount = amountMatch ? parseFloat(amountMatch[1].replace(',','.')) : 0;

  const ym = currentYearMonth();
  const iid = 'inc_' + uid();
  const concept = 'Comisión — ' + (m.from||'proveedor') + ' (desde mail)';
  D.incomeItems[iid] = {
    name: concept, amount: suggestedAmount, month: ym,
    type: 'commission', status: 'pendiente',
    notes: 'Auto-creado desde mail. Revisar monto y cliente.\n\n' + text.slice(0,300),
    createdAt: Date.now()
  };
  m.processedAs = 'income:' + iid;
  save(); closeModal(); showNotif('Comisión creada en CashFlow — revisá monto');
  go('cash');
}

function inboxActionArchive(id){
  const m = D.inbox[id];
  if(!m) return;
  m.archived = true;
  m.archivedAt = Date.now();
  save(); closeModal(); showNotif('Archivado 🗄️');
  renderCurrent();
}

function inboxActionDelete(id){
  if(!confirm('¿Borrar este mail del inbox?')) return;
  delete D.inbox[id];
  save(); closeModal(); showNotif('Eliminado');
  renderCurrent();
}

// ═══════════════════════════════════════════════════════════════
// RENDER: PANEL HOY (centro de acción diario)
// ═══════════════════════════════════════════════════════════════
function renderHoy(){
  const now = new Date();
  const today = now.toISOString().slice(0,10);
  const currentYM = currentYearMonth();
  const thisWeekEnd = new Date(now); thisWeekEnd.setDate(now.getDate() + 7);
  const thisWeekStart = new Date(now);

  // ── 1. COBROS VENCIDOS + ESTA SEMANA ─────────────────────
  const allItems = buildCashflowItems();
  const overdueOrDue = allItems.filter(it=>{
    if(it.status === 'cobrada') return false;
    if(!it.month) return false;
    // Pasar 'YYYY-MM' a una fecha del primer día del mes
    const [y,m] = it.month.split('-');
    const itemDate = new Date(parseInt(y), parseInt(m)-1, 1);
    // Si el mes ya pasó o es el mes actual, es "por cobrar"
    return itemDate <= thisWeekEnd;
  });
  // Ordenar por mes (más viejos primero)
  overdueOrDue.sort((a,b)=>(a.month||'').localeCompare(b.month||''));

  const totalOverdue = overdueOrDue.filter(it=>{
    const [y,m] = (it.month||'').split('-');
    const itemDate = new Date(parseInt(y), parseInt(m)-1, 1);
    return itemDate < new Date(now.getFullYear(), now.getMonth(), 1);
  }).reduce((a,it)=>a+(it.amount||0),0);

  const totalThisMonth = overdueOrDue.filter(it=>it.month === currentYM).reduce((a,it)=>a+(it.amount||0),0);

  const cobrosHTML = overdueOrDue.length ? overdueOrDue.slice(0,15).map(it=>{
    const [y,m] = (it.month||'').split('-');
    const itemDate = new Date(parseInt(y), parseInt(m)-1, 1);
    const isOverdue = itemDate < new Date(now.getFullYear(), now.getMonth(), 1);
    const isThisMonth = it.month === currentYM;
    const color = isOverdue ? 'var(--rd)' : isThisMonth ? 'var(--yw)' : 'var(--tx2)';
    const icon = isOverdue ? '🔴' : isThisMonth ? '🟡' : '⏳';
    const label = isOverdue ? 'Vencido' : isThisMonth ? 'Este mes' : 'Próximo';
    const onclickAttr = it.clientId ? `onclick="showClientDetail('${it.clientId}')"` : (it.incomeItemId ? `onclick="openIncomeItemModal('${it.incomeItemId}')"` : (it.projectedId ? `onclick="openProjectedModal('${it.projectedId}')"` : ''));
    return `<div class="cfrow" style="cursor:${onclickAttr?'pointer':'default'}" ${onclickAttr}>
      <span>${icon} ${it.name}<br><span style="font-size:10px;color:${color}">${label} · ${ymToLabel(it.month)}</span></span>
      <span class="cfval" style="color:${color}">USD ${(it.amount||0).toLocaleString()}</span>
    </div>`;
  }).join('') : '<div style="font-size:12px;color:var(--tx3);padding:12px">✅ Nada pendiente esta semana</div>';

  // ── 2. LEADS SIN CONTACTAR >48h ─────────────────────────
  const leads = Object.entries(D.leads||{}).map(([id,l])=>({...l,_id:id}));
  const now_ts = Date.now();
  const leadsNoContact = leads.filter(l=>{
    if(l.stage !== 'Lead') return false; // Solo leads frescos
    if(l.contactedAt) return false;
    const hoursOld = (now_ts - (l.createdAt||now_ts))/3600000;
    return hoursOld >= 48;
  }).sort((a,b)=>(a.createdAt||0)-(b.createdAt||0));

  const leadsHTML = leadsNoContact.length ? leadsNoContact.slice(0,10).map(l=>{
    const hoursOld = (now_ts-(l.createdAt||now_ts))/3600000;
    const daysOld = Math.floor(hoursOld/24);
    const urgency = hoursOld >= 72 ? 'var(--rd)' : 'var(--yw)';
    return `<div class="cfrow" style="cursor:pointer" onclick="showLeadDetail('${l._id}')">
      <span>${l.name||'—'}<br><span style="font-size:10px;color:${urgency}">⚠️ ${daysOld}d sin contactar · ${l.canal||''} · ${l.dest||'—'}</span></span>
      <span style="font-size:11px;color:var(--tx3)">→</span>
    </div>`;
  }).join('') : '<div style="font-size:12px;color:var(--tx3);padding:12px">✅ Todos contactados</div>';

  // ── 3. CLIENTES VIAJANDO / POR VIAJAR ESTA SEMANA ───────
  const clients = Object.entries(D.clients||{}).map(([id,c])=>({...c,_id:id}));
  const clientsTravelWeek = clients.filter(c=>{
    if(!c.fechaViaje) return false;
    const dt = new Date(c.fechaViaje);
    if(isNaN(dt.getTime())) return false;
    const diffDays = (dt-now)/86400000;
    return diffDays >= -7 && diffDays <= 14; // una semana antes/después + 2 semanas adelante
  }).sort((a,b)=>new Date(a.fechaViaje)-new Date(b.fechaViaje));

  const clientsHTML = clientsTravelWeek.length ? clientsTravelWeek.map(c=>{
    const dt = new Date(c.fechaViaje);
    const diffDays = Math.ceil((dt-now)/86400000);
    const label = diffDays < 0 ? `viajando (día ${Math.abs(diffDays)})` : diffDays === 0 ? '🛫 Viaja HOY' : `en ${diffDays}d`;
    const color = diffDays < 0 ? 'var(--gold)' : diffDays <= 3 ? 'var(--rd)' : 'var(--yw)';
    return `<div class="cfrow" style="cursor:pointer" onclick="showClientDetail('${c._id}')">
      <span>${c.name}<br><span style="font-size:10px;color:${color}">✈️ ${label} · ${c.dest||'—'}</span></span>
      <span style="font-size:11px;color:var(--tx3)">→</span>
    </div>`;
  }).join('') : '<div style="font-size:12px;color:var(--tx3);padding:12px">Nadie viaja esta semana</div>';

  // ── 4. TAREAS VENCIDAS / DE HOY ─────────────────────────
  const tasks = Object.entries(D.tasks||{}).map(([id,t])=>({...t,_id:id})).filter(t=>!t.done);
  const tasksUrgent = tasks.filter(t=>{
    if(!t.deadline) return false;
    return isOverdue(t.deadline) || isToday(t.deadline);
  });
  // Tareas de alta prioridad sin fecha
  const tasksHighPri = tasks.filter(t=>t.pri === 'rd' && !t.deadline).slice(0,5);

  const urgentTasks = [...tasksUrgent, ...tasksHighPri];
  const tasksHTML = urgentTasks.length ? urgentTasks.slice(0,10).map(t=>{
    const isOver = t.deadline && isOverdue(t.deadline);
    const isHoy = t.deadline && isToday(t.deadline);
    const icon = isOver ? '🔴' : isHoy ? '📌' : '🔥';
    const color = isOver ? 'var(--rd)' : isHoy ? 'var(--yw)' : 'var(--or)';
    const label = isOver ? 'Vencida' : isHoy ? 'Hoy' : 'Alta prioridad';
    return `<div class="cfrow" style="cursor:pointer" onclick="toggleTask('${t._id}')">
      <span>${icon} ${t.title}<br><span style="font-size:10px;color:${color}">${label}${t.deadline?' · '+fmtDate(t.deadline):''}</span></span>
      <span style="font-size:11px;color:var(--tx3)">✓</span>
    </div>`;
  }).join('') : '<div style="font-size:12px;color:var(--tx3);padding:12px">✅ Sin tareas urgentes</div>';

  // ── RENDER ─────────────────────────────────────────────
  const dateLabel = now.toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});

// RENDER: PROVEEDORES (editable por sector)
// ═══════════════════════════════════════════════════════════════
function renderProviders(){
  const allProviders = Object.entries(D.providers||{}).map(([id,p])=>({...p,_id:id}));
  // Agrupar por sector
  const bySector = {};
  PROVIDER_SECTORS.forEach(s=>{ bySector[s.id] = []; });
  allProviders.forEach(p=>{
    const sid = p.sector || 'otro';
    if(!bySector[sid]) bySector[sid] = [];
    bySector[sid].push(p);
  });

  const statusColors = {
    'activo':'var(--gn)',
    'habilitado_sin_usar':'var(--gold)',
    'en_tramite':'var(--yw)',
    'pendiente_tids':'var(--pp)',
    'sin_respuesta':'var(--rd)',
    'por_salir':'var(--or)',
    'cerrado':'var(--rd)',
    'descartado':'var(--tx3)'
  };
  const statusLabels = {
    'activo':'🟢 Activo',
    'habilitado_sin_usar':'🟡 Habilitado (sin estrenar)',
    'en_tramite':'⏳ En trámite',
    'pendiente_tids':'⏸️ Esperando TIDS',
    'sin_respuesta':'❓ Sin respuesta',
    'por_salir':'🔶 Por salir',
    'cerrado':'❌ Cerrado',
    'descartado':'🚫 Descartado'
  };

  // Resumen arriba
  const totalActive = allProviders.filter(p=>p.status==='activo').length;
  const totalPending = allProviders.filter(p=>['en_tramite','pendiente_tids','sin_respuesta','habilitado_sin_usar'].includes(p.status)).length;
  const totalOut = allProviders.filter(p=>['cerrado','descartado','por_salir'].includes(p.status)).length;

  let html = `
    <button class="back" onclick="go('inicio')">← Inicio</button>
    <h2 style="padding:8px 4px;margin:0">🗂 Proveedores</h2>
    <div class="kgrid">
      <div class="kcard"><div class="kl">Activos</div><div class="kv" style="color:var(--gn)">${totalActive}</div></div>
      <div class="kcard"><div class="kl">Pendientes</div><div class="kv" style="color:var(--yw)">${totalPending}</div></div>
      <div class="kcard"><div class="kl">De salida / descartados</div><div class="kv" style="color:var(--rd)">${totalOut}</div></div>
    </div>
    <div style="margin:8px 0"><button class="btn-add" onclick="openProviderModal()">+ Proveedor</button></div>
  `;

  PROVIDER_SECTORS.forEach(sector=>{
    const provs = bySector[sector.id] || [];
    if(provs.length === 0) return;
    html += `<div class="shdr"><h3>${sector.name} (${provs.length})</h3></div>`;
    provs.sort((a,b)=>(a.name||'').localeCompare(b.name||''));
    provs.forEach(p=>{
      const statusColor = statusColors[p.status] || 'var(--tx3)';
      const statusLabel = statusLabels[p.status] || p.status;
      const paymentLabel = p.paymentTiming === 'upfront' ? '💰 Upfront' : '⏳ Post-viaje';
      html += `<div class="cfrow" style="cursor:pointer" onclick="openProviderModal('${p._id}')">
        <span>
          <b>${p.name}</b><br>
          <span style="font-size:10px;color:${statusColor}">${statusLabel}</span>
          <span style="font-size:10px;color:var(--tx3)"> · ${paymentLabel}</span>
          ${p.commission?'<br><span style="font-size:10px;color:var(--tx2)">💼 '+p.commission+'</span>':''}
          ${p.notes?'<br><span style="font-size:10px;color:var(--tx3);font-style:italic">"'+p.notes.slice(0,120)+(p.notes.length>120?'...':'')+'"</span>':''}
        </span>
        <span style="font-size:11px;color:var(--tx3)">✎</span>
      </div>`;
    });
  });

  document.getElementById('v-providers').innerHTML = html;
}

function openProviderModal(id){
  const p = id ? D.providers[id] : null;
  const m = document.getElementById('modalContent');
  const sectorOpts = PROVIDER_SECTORS.map(s=>`<option value="${s.id}"${p&&p.sector===s.id?' selected':''}>${s.name}</option>`).join('');
  const statuses = [
    {id:'activo',label:'🟢 Activo'},
    {id:'habilitado_sin_usar',label:'🟡 Habilitado (sin estrenar)'},
    {id:'en_tramite',label:'⏳ En trámite'},
    {id:'pendiente_tids',label:'⏸️ Esperando TIDS'},
    {id:'sin_respuesta',label:'❓ Sin respuesta'},
    {id:'por_salir',label:'🔶 Por salir'},
    {id:'cerrado',label:'❌ Cerrado'},
    {id:'descartado',label:'🚫 Descartado'}
  ];
  const statusOpts = statuses.map(s=>`<option value="${s.id}"${p&&p.status===s.id?' selected':''}>${s.label}</option>`).join('');
  const timingOpts = ['post','upfront'].map(t=>`<option value="${t}"${p&&p.paymentTiming===t?' selected':''}>${t==='post'?'⏳ Post-viaje':'💰 Upfront'}</option>`).join('');
  m.innerHTML = `<h3>${p?'Editar':'Nuevo'} proveedor</h3>
    <div class="fg"><label>Nombre</label><input id="mpv-name" value="${p?(p.name||'').replace(/"/g,'&quot;'):''}" placeholder="Ej: Hotelbeds"></div>
    <div class="frow">
      <div class="fg"><label>Sector</label><select id="mpv-sector">${sectorOpts}</select></div>
      <div class="fg"><label>Estado</label><select id="mpv-status">${statusOpts}</select></div>
    </div>
    <div class="frow">
      <div class="fg"><label>Comisión / condiciones</label><input id="mpv-commission" value="${p?(p.commission||'').replace(/"/g,'&quot;'):''}" placeholder="Ej: 8% post-viaje o 'neto+markup'"></div>
      <div class="fg"><label>Timing de pago</label><select id="mpv-timing">${timingOpts}</select></div>
    </div>
    <div class="fg"><label>Contacto</label><input id="mpv-contact" value="${p?(p.contact||'').replace(/"/g,'&quot;'):''}" placeholder="Email, teléfono, persona de contacto"></div>
    <div class="fg"><label>Credenciales / login</label><input id="mpv-credentials" value="${p?(p.credentials||'').replace(/"/g,'&quot;'):''}" placeholder="URL portal, ID de agencia, etc."></div>
    <div class="fg"><label>Notas</label><textarea id="mpv-notes">${p?(p.notes||''):''}</textarea></div>
    <button class="btn1" onclick="saveProvider('${id||''}')">Guardar</button>
    ${id?`<button class="btn-del" onclick="deleteProvider('${id}')">Eliminar</button>`:''}
    <button class="btn2" onclick="closeModal()">Cancelar</button>`;
  document.getElementById('modalBg').classList.add('on');
}

function saveProvider(id){
  const name = document.getElementById('mpv-name').value.trim();
  if(!name){showNotif('Ingresá el nombre');return}
  const pid = id || ('prov_' + name.toLowerCase().replace(/[^a-z0-9]/g,'_').replace(/_+/g,'_') + '_' + uid());
  const existing = D.providers[pid] || {};
  D.providers[pid] = {
    ...existing,
    name,
    sector: document.getElementById('mpv-sector').value,
    status: document.getElementById('mpv-status').value,
    commission: document.getElementById('mpv-commission').value,
    paymentTiming: document.getElementById('mpv-timing').value,
    contact: document.getElementById('mpv-contact').value,
    credentials: document.getElementById('mpv-credentials').value,
    notes: document.getElementById('mpv-notes').value,
    createdAt: existing.createdAt || Date.now(),
    updatedAt: Date.now()
  };
  save(); closeModal(); showNotif(id?'Proveedor actualizado ✓':'Proveedor agregado ✓');
  renderCurrent();
}

function deleteProvider(id){
  const p = D.providers[id];
  if(!p) return;
  if(!confirm('¿Borrar el proveedor "'+p.name+'"? Esto no afecta las comisiones existentes de clientes.')) return;
  delete D.providers[id];
  save(); closeModal(); showNotif('Proveedor eliminado');
  renderCurrent();
}

// RENDER: TAREAS

function renderTaskDeadline(id, deadline){
  const valid = deadline && !isNaN(new Date(deadline).getTime());
  if(valid){
    return '<span class="tsk-deadline '+deadlineClass(deadline)+'" onclick="event.stopPropagation();openTaskDatePicker(\''+id+'\')">'+deadlineLabel(deadline)+'</span>';
  }
  return '<span class="tsk-deadline" style="cursor:pointer;background:var(--s2);color:var(--tx3)" onclick="event.stopPropagation();openTaskDatePicker(\''+id+'\')">📅 + fecha</span>';
}

function openTaskDatePicker(taskId){
  const t = D.tasks[taskId];
  if(!t) return;
  const input = document.createElement('input');
  input.type = 'date';
  input.value = (t.deadline && !isNaN(new Date(t.deadline).getTime())) ? t.deadline : '';
  input.style.cssText = 'position:fixed;top:-100px;left:-100px;opacity:0';
  document.body.appendChild(input);
  input.onchange = ()=>{
    if(input.value){
      D.tasks[taskId].deadline = input.value;
    } else {
      delete D.tasks[taskId].deadline;
    }
    save();
    document.body.removeChild(input);
    renderCurrent();
  };
  input.onblur = ()=>{ setTimeout(()=>{ if(input.parentNode) document.body.removeChild(input); }, 100); };
  if(input.showPicker) input.showPicker(); else input.click();
}

function renderTareas(){
  const cats = [{id:'todos',name:'Todos'},...D.categories];
  document.getElementById('taskCatTabs').innerHTML = cats.map(c=>
    `<button class="ftab${taskCatFilter===c.id?' on':''}" onclick="taskCatFilter='${c.id}';renderTareas()">${c.name}</button>`
  ).join('');
  
  document.getElementById('taskPriTabs').innerHTML = [
    {id:'todos',name:'Todas'},{id:'rd',name:'🔴 Alta'},{id:'yw',name:'🟡 Media'},{id:'gn',name:'🟢 Baja'}
  ].map(p=>`<button class="ftab${taskPriFilter===p.id?' on':''}" onclick="taskPriFilter='${p.id}';renderTareas()">${p.name}</button>`).join('');
  
  let tasks = Object.entries(D.tasks).map(([id,t])=>({...t,_id:id}));
  if(taskCatFilter!=='todos') tasks = tasks.filter(t=>t.cat===taskCatFilter);
  if(taskPriFilter!=='todos') tasks = tasks.filter(t=>t.pri===taskPriFilter);
  tasks.sort((a,b)=>{
    if(a.done!==b.done) return a.done?1:-1;
    const priOrder = {rd:0,yw:1,gn:2};
    return (priOrder[a.pri]||1)-(priOrder[b.pri]||1);
  });
  
  const catName = (id) => D.categories.find(c=>c.id===id)?.name || id;
  
  document.getElementById('taskList').innerHTML = tasks.length ? tasks.map(t=>
    `<div class="tsk ${t.done?'done':''}" onclick="toggleTask('${t._id}')">
      <div class="tsk-chk">${t.done?'✓':''}</div>
      <div class="tsk-pri pri-${t.pri||'yw'}"></div>
      <div class="tsk-info">
        <div class="tsk-title">${t.recurring?'🔄 ':''}${t.title}</div>
        <div class="tsk-meta">
          <span>${catName(t.cat)}</span>
          ${renderTaskDeadline(t._id, t.deadline)}
        </div>
      </div>
      <button style="background:none;border:none;color:var(--tx3);font-size:14px;padding:4px" onclick="event.stopPropagation();deleteTask('${t._id}')">🗑</button>
    </div>`
  ).join('') : '<div class="empty"><div class="em">✅</div><p>Sin tareas pendientes</p></div>';
}

function renderContenido(){
  document.getElementById('contTabs').innerHTML = [
    {id:'cal',name:'📅 Calendario'},{id:'ideas',name:'💡 Ideas'}
  ].map(t=>`<button class="ftab${contFilter===t.id?' on':''}" onclick="contFilter='${t.id}';document.getElementById('contTitle').textContent=contFilter==='cal'?'Calendario':'Ideas';renderContenido()">${t.name}</button>`).join('');
  
  let items = Object.entries(D.content).filter(([id,c])=>c.type===contFilter).map(([id,c])=>({...c,_id:id}));
  items.sort((a,b)=>{
    if(a.date&&b.date) return new Date(a.date)-new Date(b.date);
    return (b.createdAt||0)-(a.createdAt||0);
  });
  
  document.getElementById('contList').innerHTML = items.length ? items.map(c=>{
    const d = c.date ? new Date(c.date) : null;
    return `<div class="cal-item">
      ${d?`<div class="cal-date"><div class="cal-day">${d.getDate()}</div><div class="cal-mon">${['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'][d.getMonth()]}</div></div>`:'<div class="cal-date"><div class="cal-day">💡</div></div>'}
      <div class="cal-info">
        <div class="cal-title">${c.title}</div>
        <div class="cal-desc">${c.format||''} ${c.desc?'· '+c.desc:''}</div>
      </div>
      <button style="background:none;border:none;color:var(--tx3);font-size:14px" onclick="if(confirm('¿Eliminar?')){delete D.content['${c._id}'];save();renderContenido()}">🗑</button>
    </div>`;
  }).join('') : '<div class="empty"><div class="em">'+(contFilter==='cal'?'📅':'💡')+'</div><p>Sin '+(contFilter==='cal'?'publicaciones programadas':'ideas guardadas')+'</p></div>';
}

// ═══════════════════════════════════════════════════════════════
// RENDER: ALERTAS
// ═══════════════════════════════════════════════════════════════
function getAlerts(){
  const alerts = [];
  const now = Date.now();
  const dismissed = D.alertsDismissedAt || 0;
  
  // Lead sin contactar 24h/48h
  Object.entries(D.leads).forEach(([id,l])=>{
    if(l.stage==='Lead' && !l.contactedAt && (l.createdAt||0) > dismissed){
      const h = (now - (l.createdAt||now))/3600000;
      if(h>=48) alerts.push({type:'rd',title:'🔴 '+l.name+' — 48h sin contacto!',desc:'Lead de '+l.canal+' sin primer contacto. Riesgo alto de pérdida.',time:ago(l.createdAt),action:()=>showLeadDetail(id)});
      else if(h>=24) alerts.push({type:'yw',title:'⚠️ '+l.name+' — 24h sin contacto',desc:'Contactar hoy para no perder el lead.',time:ago(l.createdAt),action:()=>showLeadDetail(id)});
    }
  });
  
  // Tareas vencidas
  Object.entries(D.tasks).forEach(([id,t])=>{
    if(!t.done && t.deadline && isOverdue(t.deadline) && (t.createdAt||0) > dismissed){
      alerts.push({type:'rd',title:'📌 Tarea vencida: '+t.title,desc:'Fecha límite: '+t.deadline,time:'Vencida'});
    } else if(!t.done && t.deadline && isToday(t.deadline)){
      alerts.push({type:'yw',title:'⏰ Tarea vence hoy: '+t.title,desc:'Completar antes de que termine el día',time:'Hoy'});
    }
  });
  
  // Client tasks vencidas
  Object.entries(D.clients).forEach(([cid,c])=>{
    if(c.tasks){
      Object.entries(c.tasks).forEach(([tid,t])=>{
        if(!t.done && t.deadline && isOverdue(t.deadline) && (t.createdAt||0) > dismissed){
          alerts.push({type:'rd',title:'📌 '+c.name+': '+t.title,desc:'Tarea de cliente vencida: '+t.deadline,time:'Vencida',action:()=>showClientDetail(cid)});
        } else if(!t.done && t.deadline && isToday(t.deadline)){
          alerts.push({type:'yw',title:'⏰ '+c.name+': '+t.title,desc:'Tarea vence hoy',time:'Hoy',action:()=>showClientDetail(cid)});
        }
      });
    }
  });
  
  // Pagos pendientes
  Object.entries(D.payments).forEach(([id,p])=>{
    if(p.status==='Pendiente' && (p.createdAt||0) > dismissed){
      const clientName = D.clients[p.clientId]?.name||'—';
      alerts.push({type:'yw',title:'💳 Pago pendiente: '+clientName,desc:p.concept+' — USD '+p.amount,time:p.date||''});
    }
  });
  
  return alerts;
}

function clearAlerts(){
  if(!confirm('¿Limpiar todas las alertas actuales? Las nuevas que aparezcan después van a seguir mostrándose.')) return;
  D.alertsDismissedAt = Date.now();
  save();
  renderCurrent();
  showNotif('🔔 Alertas limpiadas ✓');
}

function renderAlertas(){
  const alerts = getAlerts();
  document.getElementById('alertList').innerHTML = alerts.length ? alerts.map(a=>
    `<div class="alcard ${a.type}" ${a.action?'onclick="('+a.action.toString()+')()" style="cursor:pointer"':''}>
      <div class="al-t">${a.title}</div>
      <div class="al-d">${a.desc}</div>
      <div class="al-time">${a.time}</div>
    </div>`
  ).join('') : '<div class="empty"><div class="em">🔔</div><p>Sin alertas — todo en orden 👍</p></div>';
}

function updateInboxBadge(){
  const badge = document.getElementById('inboxBadge');
  if(!badge) return;
  const unread = Object.values(D.inbox||{}).filter(m=>!m.read && !m.archived).length;
  badge.textContent = unread > 0 ? '●' : '';
}

function updateAlertBadge(){
  const count = getAlerts().filter(a=>a.type==='rd').length;
  const b = document.getElementById('alertBadge');
  const bm = document.getElementById('alertBadgeMenu');
  if(count>0){
    b.textContent=count;b.style.display='flex';
    bm.textContent='('+count+')';
  } else {
    b.style.display='none';bm.textContent='';
  }
}
</script>
